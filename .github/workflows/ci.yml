name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verification:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Static analysis
            command: ./gradlew ktlintCheck detekt
            firebase: false
            reports: false
          - name: Unit tests
            command: >-
              ./gradlew testDebugUnitTest
              :architecture-tests:test
              :core:data:test
              :core:domain:test
            firebase: true
            reports: true
          - name: Debug build
            command: ./gradlew assembleDebug
            firebase: true
            reports: false

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Configure Firebase
        if: matrix.firebase
        env:
          GOOGLE_SERVICES_DEBUG_JSON: ${{ secrets.GOOGLE_SERVICES_DEBUG_JSON }}
          GOOGLE_SERVICES_RELEASE_JSON: ${{ secrets.GOOGLE_SERVICES_RELEASE_JSON }}
        run: |
          mkdir -p app/src/debug app/src/release

          if [ -n "$GOOGLE_SERVICES_DEBUG_JSON" ]; then
            printf '%s' "$GOOGLE_SERVICES_DEBUG_JSON" > app/src/debug/google-services.json
          else
            printf '%s' '{"project_info":{"project_number":"1","project_id":"santoro-ci"},"client":[{"client_info":{"mobilesdk_app_id":"1:1:android:1","android_client_info":{"package_name":"com.asensiodev.santoro.debug"}},"api_key":[{"current_key":"ci-placeholder"}]}],"configuration_version":"1"}' > app/src/debug/google-services.json
          fi

          if [ -n "$GOOGLE_SERVICES_RELEASE_JSON" ]; then
            printf '%s' "$GOOGLE_SERVICES_RELEASE_JSON" > app/src/release/google-services.json
          else
            printf '%s' '{"project_info":{"project_number":"1","project_id":"santoro-ci"},"client":[{"client_info":{"mobilesdk_app_id":"1:1:android:2","android_client_info":{"package_name":"com.asensiodev.santoro"}},"api_key":[{"current_key":"ci-placeholder"}]}],"configuration_version":"1"}' > app/src/release/google-services.json
          fi

      - name: Run ${{ matrix.name }}
        run: ${{ matrix.command }}

      - name: Upload test reports
        if: failure() && matrix.reports
        uses: actions/upload-artifact@v6
        with:
          name: unit-test-reports
          path: "**/build/reports/tests/**"
          if-no-files-found: ignore
          retention-days: 7

  instrumented-tests:
    name: Instrumented feature tests
    needs: verification
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run instrumented tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          script: >-
            ./gradlew
            :core:database:connectedDebugAndroidTest
            :feature:watchlist:impl:connectedDebugAndroidTest
            :feature:movie-detail:impl:connectedDebugAndroidTest
            :feature:watched-movies:impl:connectedDebugAndroidTest

      - name: Upload instrumented test reports
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: instrumented-test-reports
          path: "**/build/reports/androidTests/**"
          if-no-files-found: ignore
          retention-days: 7
